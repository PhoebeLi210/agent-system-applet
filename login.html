<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>管理员登录</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        
        .login-container h1 {
            margin-bottom: 30px;
            color: #333;
            font-size: 24px;
            font-weight: 600;
        }
        
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #666;
            font-weight: 500;
        }
        
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e1e1e1;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #1890ff;
            box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.1);
        }
        
        .remember-me {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            text-align: left;
        }
        
        .remember-me input {
            margin-right: 8px;
        }
        
        .remember-me label {
            font-size: 14px;
            color: #666;
            cursor: pointer;
        }
        
        .login-btn {
            width: 100%;
            padding: 12px;
            background: #1890ff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .login-btn:hover {
            background: #40a9ff;
        }
        
        .login-btn:active {
            background: #096dd9;
        }
        
        .error-message {
            background: #fff2f0;
            border: 1px solid #ffccc7;
            color: #f5222d;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        
        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }
            
            .login-container h1 {
                font-size: 20px;
                margin-bottom: 20px;
            }
            
            .input-group input {
                padding: 10px;
            }
            
            .login-btn {
                padding: 10px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>管理员登录</h1>
        <div id="error-message" class="error-message"></div>
        <form id="login-form">
            <div class="input-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="input-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="remember-me">
                <input type="checkbox" id="rememberMe" name="rememberMe">
                <label for="rememberMe">记住我</label>
            </div>
            <button type="button" class="login-btn" onclick="login()">登录</button>
        </form>
    </div>
    
    <script>
        // 安全的localStorage访问函数
        function safeLocalStorageGet(key, defaultValue = '') {
            try {
                return localStorage.getItem(key) || defaultValue;
            } catch (e) {
                console.warn('localStorage访问被阻止，使用默认值:', defaultValue);
                return defaultValue;
            }
        }
        
        // 安全的localStorage设置函数
        function safeLocalStorageSet(key, value) {
            try {
                localStorage.setItem(key, value);
                return true;
            } catch (e) {
                console.warn('localStorage设置被阻止:', e);
                return false;
            }
        }
        
        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const errorMessage = document.getElementById('error-message');
            
            // 隐藏错误信息
            errorMessage.style.display = 'none';
            
            // 验证输入
            if (!username || !password) {
                errorMessage.textContent = '请输入用户名和密码';
                errorMessage.style.display = 'block';
                return;
            }
            
            // 发送登录请求
            fetch('/api/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, password })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    console.log('登录成功:', data);
                    
                    // 保存token到localStorage
                    if (data.token) {
                        safeLocalStorageSet('adminToken', data.token);
                        console.log('token已保存');
                    }
                    
                    // 保存用户信息
                    safeLocalStorageSet('user', JSON.stringify(data.user));
                    console.log('用户信息已保存');
                    
                    // 保存用户名和密码（如果勾选了记住我）
                    if (rememberMe) {
                        safeLocalStorageSet('adminUsername', username);
                        safeLocalStorageSet('adminPassword', password);
                        console.log('用户名和密码已保存');
                    }
                    
                    // 跳转到admin页面（添加时间戳避免缓存）
                    const timestamp = new Date().getTime();
                    window.location.href = `/admin?timestamp=${timestamp}`;
                } else {
                    errorMessage.textContent = data.error || '登录失败';
                    errorMessage.style.display = 'block';
                }
            })
            .catch(error => {
                console.error('登录错误:', error);
                errorMessage.textContent = '登录失败，请稍后重试';
                errorMessage.style.display = 'block';
            });
        }
        
        // 页面加载时填充保存的用户名和密码
        window.addEventListener('DOMContentLoaded', function() {
            const savedUsername = safeLocalStorageGet('adminUsername');
            const savedPassword = safeLocalStorageGet('adminPassword');
            if (savedUsername) {
                document.getElementById('username').value = savedUsername;
                if (savedPassword) {
                    document.getElementById('password').value = savedPassword;
                }
                document.getElementById('rememberMe').checked = true;
            }
        });
        
        // 回车键登录
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });
    </script>
</body>
</html>
