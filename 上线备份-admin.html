<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #1890ff;
        }
        
        .nav {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            gap: 20px;
        }
        
        .nav button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            background: #1890ff;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }
        
        .nav button:hover {
            background: #40a9ff;
        }
        
        .tab-content {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .tab-content:not(.active) {
            display: none;
        }
        
        .photos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .photo-item {
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }
        
        .photo-item img {
            max-width: 100%;
            max-height: 150px;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 10px;
        }
        
        .photo-info {
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
        }
        
        .download-btn {
            padding: 5px 10px;
            border: none;
            border-radius: 4px;
            background: #52c41a;
            color: white;
            cursor: pointer;
            font-size: 12px;
        }
        
        .download-btn:hover {
            background: #73d13d;
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        .data-table th, .data-table td {
            border: 1px solid #e8e8e8;
            padding: 10px;
            text-align: left;
        }
        
        .data-table th {
            background: #f0f0f0;
            font-weight: 600;
        }
        
        .data-table tr:hover {
            background: #f5f5f5;
        }
        
        .empty {
            text-align: center;
            padding: 50px;
            color: #999;
        }
        
        /* 移动端适配 */
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            h1 {
                font-size: 20px;
            }
            
            .nav {
                flex-wrap: wrap;
                gap: 10px;
            }
            
            .nav button {
                flex: 1;
                min-width: 80px;
                font-size: 12px;
                padding: 8px 12px;
            }
            
            .tab-content {
                padding: 15px;
            }
            
            .photos-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 10px;
            }
            
            .data-table {
                font-size: 12px;
            }
            
            .data-table th, .data-table td {
                padding: 8px 5px;
            }
            
            .data-table {
                display: block;
                overflow-x: auto;
                white-space: nowrap;
            }
            
        }
        
        @media (max-width: 480px) {
            .photos-grid {
                grid-template-columns: 1fr;
            }
            
            .nav button {
                min-width: 60px;
                font-size: 11px;
                padding: 6px 10px;
            }
            
            h2 {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1 style="margin: 0;">管理后台</h1>
            <button onclick="logout()" style="padding: 8px 16px; border: none; border-radius: 4px; background: #ff4d4f; color: white; cursor: pointer; font-size: 14px;">
                <i class="fas fa-sign-out-alt"></i> 退出登录
            </button>
        </div>
        
        <div class="nav">
            <button onclick="showTab('merchants')">商户管理</button>
            <button onclick="showTab('photos')">照片管理</button>
            <button onclick="showTab('data')">数据管理</button>
        </div>
        
        <div id="merchants" class="tab-content active">
            <h2>商户注册信息管理</h2>
            <div id="merchants-container">
                <div class="empty">加载中...</div>
            </div>
        </div>
        
        <div id="photos" class="tab-content">
            <h2>上传照片管理</h2>
            <div id="photos-container">
                <div class="empty">加载中...</div>
            </div>
        </div>
        
        <div id="data" class="tab-content">
            <h2>商户数据管理</h2>
            <div id="data-container">
                <div class="empty">加载中...</div>
            </div>
        </div>
    </div>
    
    <script>
        // Cookie操作函数
        function setCookie(name, value, hours) {
            try {
                const expires = new Date();
                expires.setTime(expires.getTime() + (hours * 60 * 60 * 1000));
                document.cookie = name + '=' + encodeURIComponent(value) + ';expires=' + expires.toUTCString() + ';path=/';
                return true;
            } catch (e) {
                console.warn('Cookie设置失败:', e);
                return false;
            }
        }
        
        function getCookie(name) {
            try {
                const nameEQ = name + '=';
                const ca = document.cookie.split(';');
                for (let i = 0; i < ca.length; i++) {
                    let c = ca[i];
                    while (c.charAt(0) === ' ') c = c.substring(1);
                    if (c.indexOf(nameEQ) === 0) {
                        return decodeURIComponent(c.substring(nameEQ.length));
                    }
                }
                return '';
            } catch (e) {
                console.warn('Cookie读取失败:', e);
                return '';
            }
        }
        
        function deleteCookie(name) {
            try {
                document.cookie = name + '=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=/;';
                return true;
            } catch (e) {
                console.warn('Cookie删除失败:', e);
                return false;
            }
        }
        
        // 安全的localStorage访问函数
        function safeLocalStorageGet(key, defaultValue = '') {
            try {
                return localStorage.getItem(key) || defaultValue;
            } catch (e) {
                console.warn('localStorage访问被阻止，使用默认值:', defaultValue);
                return defaultValue;
            }
        }
        
        // 安全的localStorage设置函数
        function safeLocalStorageSet(key, value) {
            try {
                localStorage.setItem(key, value);
                return true;
            } catch (e) {
                console.warn('localStorage设置被阻止:', e);
                return false;
            }
        }
        
        // 安全的localStorage删除函数
        function safeLocalStorageRemove(key) {
            try {
                localStorage.removeItem(key);
                return true;
            } catch (e) {
                console.warn('localStorage删除被阻止:', e);
                return false;
            }
        }
        
        // 获取token（优先从localStorage，其次从cookie）
        function getToken() {
            // 先尝试从localStorage获取
            let token = safeLocalStorageGet('adminToken');
            if (token) {
                console.log('从localStorage获取到token');
                return token;
            }
            // 如果localStorage没有，尝试从cookie获取
            token = getCookie('adminToken');
            if (token) {
                console.log('从cookie获取到token');
                return token;
            }
            return '';
        }
        
        // 删除token（同时删除localStorage和cookie）
        function removeToken() {
            safeLocalStorageRemove('adminToken');
            deleteCookie('adminToken');
        }
        
        // 检查登录状态
        function checkLogin() {
            const token = getToken();
            console.log('检查登录状态，token:', token ? '存在' : '不存在');
            if (!token) {
                console.log('未找到token，跳转到登录页');
                window.location.href = '/login';
                return false;
            }
            return token;
        }
        
        // 获取认证头
        function getAuthHeaders() {
            const token = checkLogin();
            return {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            };
        }
        
        function showTab(tabId) {
            // 隐藏所有标签内容
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // 显示选中的标签内容
            document.getElementById(tabId).classList.add('active');
            
            // 如果切换到照片标签，重新加载照片
            if (tabId === 'photos') {
                loadPhotos();
            }
            // 如果切换到数据标签，重新加载数据
            if (tabId === 'data') {
                loadData();
            }
            // 如果切换到商户标签，重新加载商户信息
            if (tabId === 'merchants') {
                loadMerchants();
            }
        }
        
        function loadMerchants() {
            const container = document.getElementById('merchants-container');
            container.innerHTML = '<div class="empty">加载中...</div>';
            
            // 添加时间戳参数避免缓存
            const timestamp = new Date().getTime();
            
            fetch(`/api/merchants?timestamp=${timestamp}`, {
                headers: getAuthHeaders()
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        if (data.data.length === 0) {
                            container.innerHTML = '<div class="empty">暂无商户注册信息</div>';
                        } else {
                            const table = document.createElement('table');
                            table.className = 'data-table';
                            
                            const thead = document.createElement('thead');
                            thead.innerHTML = `
                                <tr>
                                    <th><input type="checkbox" id="selectAllMerchants" onclick="selectAllMerchants()" style="width: 16px; height: 16px; cursor: pointer;"></th>
                                    <th>商户名称</th>
                                    <th>提交时间</th>
                                    <th>操作</th>
                                </tr>
                            `;
                            table.appendChild(thead);
                            
                            const tbody = document.createElement('tbody');
                            data.data.forEach(merchant => {
                                const tr = document.createElement('tr');
                                
                                tr.innerHTML = `
                                    <td><input type="checkbox" class="merchant-checkbox" data-id="${merchant.id}" onclick="updateSelectedMerchantCount()" style="width: 16px; height: 16px; cursor: pointer;"></td>
                                    <td>${merchant.merchantName || '-'}</td>
                                    <td>${merchant.created_at ? merchant.created_at.replace('T', ' ').substring(0, 19) : '-'}</td>
                                    <td>
                                        <button onclick="viewMerchant('${merchant.id}')" style="padding: 5px 10px; border: none; border-radius: 4px; background: #1890ff; color: white; cursor: pointer; font-size: 12px; margin-right: 5px;">详情</button>
                                        <button onclick="deleteMerchant('${merchant.id}')" style="padding: 5px 10px; border: none; border-radius: 4px; background: #ff4d4f; color: white; cursor: pointer; font-size: 12px;">删除</button>
                                    </td>
                                `;
                                tbody.appendChild(tr);
                            });
                            table.appendChild(tbody);
                            
                            // 添加批量操作按钮
                            const batchActions = document.createElement('div');
                            batchActions.style.marginBottom = '15px';
                            batchActions.style.display = 'flex';
                            batchActions.style.alignItems = 'center';
                            batchActions.style.gap = '10px';
                            batchActions.innerHTML = `
                                <button onclick="deleteSelectedMerchants()" style="padding: 8px 16px; border: none; border-radius: 4px; background: #ff4d4f; color: white; cursor: pointer; font-size: 14px; font-weight: 500;">
                                    <i class="fas fa-trash"></i> 批量删除
                                </button>
                                <span id="selectedMerchantCount" style="font-size: 14px; color: #666;">已选择 0 个商户</span>
                            `;
                            
                            container.innerHTML = '';
                            container.appendChild(batchActions);
                            container.appendChild(table);
                        }
                    } else {
                        container.innerHTML = '<div class="empty">加载失败</div>';
                    }
                })
                .catch(error => {
                    console.error('Error loading merchants:', error);
                    container.innerHTML = '<div class="empty">加载失败</div>';
                });
        }
        
        // 查看图片大图
        function viewImage(url) {
            const imageModal = document.createElement('div');
            imageModal.style.position = 'fixed';
            imageModal.style.top = '0';
            imageModal.style.left = '0';
            imageModal.style.width = '100%';
            imageModal.style.height = '100%';
            imageModal.style.background = 'rgba(0, 0, 0, 0.9)';
            imageModal.style.display = 'flex';
            imageModal.style.justifyContent = 'center';
            imageModal.style.alignItems = 'center';
            imageModal.style.zIndex = '9999';
            imageModal.style.cursor = 'pointer';
            
            const img = document.createElement('img');
            img.src = url;
            img.style.maxWidth = '90%';
            img.style.maxHeight = '90%';
            img.style.objectFit = 'contain';
            
            imageModal.appendChild(img);
            document.body.appendChild(imageModal);
            
            imageModal.onclick = function() {
                document.body.removeChild(imageModal);
            };
        }
        
        // 下载图片
        function downloadImage(url, filename) {
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.style.display = 'none';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
        
        // 全选照片
        function selectAllPhotos() {
            const checkboxes = document.querySelectorAll('.photo-checkbox');
            checkboxes.forEach(cb => cb.checked = true);
            updateSelectedCount();
        }
        
        // 取消全选照片
        function deselectAllPhotos() {
            const checkboxes = document.querySelectorAll('.photo-checkbox');
            checkboxes.forEach(cb => cb.checked = false);
            updateSelectedCount();
        }
        
        // 更新选中数量
        function updateSelectedCount() {
            const checkboxes = document.querySelectorAll('.photo-checkbox:checked');
            const countSpan = document.getElementById('selectedCount');
            if (countSpan) {
                countSpan.textContent = `已选择 ${checkboxes.length} 张`;
            }
        }
        
        // 批量下载选中的照片
        function downloadSelectedPhotos() {
            const checkboxes = document.querySelectorAll('.photo-checkbox:checked');
            if (checkboxes.length === 0) {
                alert('请先勾选需要下载的照片');
                return;
            }
            
            // 逐个下载选中的照片
            checkboxes.forEach((cb, index) => {
                setTimeout(() => {
                    const url = cb.dataset.url;
                    const filename = cb.dataset.filename;
                    downloadImage(url, filename);
                }, index * 500); // 每张照片间隔500ms下载，避免浏览器阻止
            });
        }
        
        function viewMerchant(id) {
            fetch(`/api/merchants/${id}`, {
                headers: getAuthHeaders()
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        const merchant = data.data;
                        
                        // 创建详细信息模态框
                        const modal = document.createElement('div');
                        modal.className = 'modal-overlay';
                        modal.style.position = 'fixed';
                        modal.style.top = '0';
                        modal.style.left = '0';
                        modal.style.width = '100%';
                        modal.style.height = '100%';
                        modal.style.background = 'rgba(0, 0, 0, 0.5)';
                        modal.style.display = 'flex';
                        modal.style.justifyContent = 'center';
                        modal.style.alignItems = 'center';
                        modal.style.zIndex = '9999';
                        
                        const modalContent = document.createElement('div');
                        modalContent.style.background = 'white';
                        modalContent.style.borderRadius = '8px';
                        modalContent.style.padding = '20px';
                        modalContent.style.maxWidth = '80%';
                        modalContent.style.maxHeight = '80%';
                        modalContent.style.overflow = 'auto';
                        modalContent.style.boxShadow = '0 4px 12px rgba(0, 0, 0, 0.15)';
                        
                        let content = '<h3 style="margin-bottom: 20px; color: #1890ff;">商户详细信息</h3>';
                        
                        // 生成7位随机商户ID
                        const merchantId = String(Math.floor(1000000 + Math.random() * 9000000));
                        
                        // 基本信息
                        const infoFields = [
                            { label: '商户ID', value: merchantId },
                            { label: '商户名称', key: 'merchantName' },
                            { label: '商户类型', key: 'merchantTypeText' },
                            { label: '营业执照编号', key: 'businessLicenseNumber' },
                            { label: '营业执照名称', key: 'businessLicenseName' },
                            { label: '营业执照有效期', key: 'licenseValidity' },
                            { label: '法人姓名', key: 'legalPersonName' },
                            { label: '身份证号', key: 'legalPersonIdNumber' },
                            { label: '身份证有效期起', key: 'legalPersonIdStartDate' },
                            { label: '身份证有效期至', key: 'legalPersonIdValidity' },
                            { label: '手机号', key: 'contactPhone' },
                            { label: '电子邮箱', key: 'contactEmail' },
                            { label: '联系地址', key: 'address' },
                            { label: '详细地址', key: 'detailAddress' },
                            { label: '开户城市', combine: ['province', 'city', 'district'] },
                            { label: '开户支行', key: 'bankBranch' },
                            { label: '结算周期', key: 'rate' },
                            { label: '开户银行', key: 'bankName' },
                            { label: '银行卡号', key: 'bankAccountNumber' },
                            { label: '提交时间', key: 'created_at', isDate: true }
                        ];
                        
                        content += '<div style="margin-bottom: 20px;">';
                        infoFields.forEach(field => {
                            let value = field.value;
                            if (field.key) {
                                value = merchant[field.key];
                            } else if (field.combine) {
                                const parts = field.combine.map(k => merchant[k]).filter(v => v);
                                value = parts.join(' ');
                            }
                            if (value) {
                                if (field.isDate) {
                                    const dateStr = typeof value === 'string' && value.includes('-') ? value.replace('T', ' ').substring(0, 19) : '-';
                                    content += `<div style="margin-bottom: 8px;"><strong>${field.label}:</strong> ${dateStr}</div>`;
                                } else {
                                    content += `<div style="margin-bottom: 8px;"><strong>${field.label}:</strong> ${value}</div>`;
                                }
                            }
                        });
                        content += '</div>';
                        
                        // 照片信息
                        const photoFields = [
                            { field: 'licensePhoto', label: '营业执照' },
                            { field: 'idCardFrontPhoto', label: '身份证正面' },
                            { field: 'idCardBackPhoto', label: '身份证反面' },
                            { field: 'bankCardPhoto', label: '银行卡' },
                            { field: 'accountMaterialPhoto', label: '开户资料' },
                            { field: 'shopFrontPhoto', label: '门头照' },
                            { field: 'shopInteriorPhoto', label: '商铺内照' },
                            { field: 'cashierPhoto', label: '收银台照' },
                            { field: 'productCodePhoto', label: '二维码或TUSN码照片' }
                        ];
                        
                        const hasPhotos = photoFields.some(pf => merchant[pf.field]);
                        
                        if (hasPhotos) {
                            content += '<h4 style="margin-bottom: 10px; color: #333;">上传照片</h4>';
                            content += '<div style="margin-bottom: 15px; display: flex; gap: 10px; align-items: center;">';
                            content += '<button onclick="selectAllPhotos()" style="padding: 6px 12px; border: 1px solid #d9d9d9; border-radius: 4px; background: white; color: #333; cursor: pointer; font-size: 12px;">全选</button>';
                            content += '<button onclick="deselectAllPhotos()" style="padding: 6px 12px; border: 1px solid #d9d9d9; border-radius: 4px; background: white; color: #333; cursor: pointer; font-size: 12px;">取消全选</button>';
                            content += '<button onclick="downloadSelectedPhotos()" style="padding: 6px 12px; border: none; border-radius: 4px; background: #52c41a; color: white; cursor: pointer; font-size: 12px; font-weight: 500;">批量下载选中照片</button>';
                            content += '<span id="selectedCount" style="font-size: 12px; color: #666;">已选择 0 张</span>';
                            content += '</div>';
                            content += '<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px;">';
                            photoFields.forEach(pf => {
                                if (merchant[pf.field]) {
                                    content += `<div style="text-align: center; border: 1px solid #e8e8e8; border-radius: 8px; padding: 10px; background: #fafafa; position: relative;">`;
                                    content += `<input type="checkbox" class="photo-checkbox" data-url="${merchant[pf.field]}" data-filename="${pf.label}.jpg" onchange="updateSelectedCount()" style="position: absolute; top: 8px; left: 8px; width: 18px; height: 18px; cursor: pointer;">`;
                                    content += `<img src="${merchant[pf.field]}" style="width: 100%; height: 120px; object-fit: cover; border-radius: 4px; cursor: pointer; margin-bottom: 8px;" onclick="viewImage('${merchant[pf.field]}')" title="点击查看大图"><br>`;
                                    content += `<div style="font-size: 12px; color: #666; margin-bottom: 5px;">${pf.label}</div>`;
                                    content += `<button onclick="downloadImage('${merchant[pf.field]}', '${pf.label}.jpg')" style="padding: 4px 8px; border: none; border-radius: 4px; background: #52c41a; color: white; cursor: pointer; font-size: 11px;">单独下载</button>`;
                                    content += `</div>`;
                                }
                            });
                            content += '</div>';
                        }
                        
                        // 关闭按钮
                        content += '<div style="text-align: center; margin-top: 20px;">';
                        content += '<button onclick="document.body.removeChild(this.closest(\'.modal-overlay\'))" style="padding: 8px 16px; border: none; border-radius: 4px; background: #1890ff; color: white; cursor: pointer;">关闭</button>';
                        content += '</div>';
                        
                        modalContent.innerHTML = content;
                        modalContent.className = 'modal';
                        modal.appendChild(modalContent);
                        document.body.appendChild(modal);
                        
                        // 点击模态框背景关闭
                        modal.onclick = function(e) {
                            if (e.target === modal) {
                                document.body.removeChild(modal);
                            }
                        };
                    } else {
                        alert('获取商户信息失败');
                    }
                })
                .catch(error => {
                    console.error('Error viewing merchant:', error);
                    alert('获取商户信息失败');
                });
        }
        
        function deleteMerchant(id) {
            if (confirm('确定要删除这个商户信息吗？')) {
                fetch(`/api/merchants/${id}`, {
                    method: 'DELETE',
                    headers: getAuthHeaders()
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert('删除成功');
                        // 延迟重新加载，确保服务器端已处理完成
                        setTimeout(loadMerchants, 1000);
                    } else {
                        alert('删除失败');
                    }
                })
                .catch(error => {
                    console.error('Error deleting merchant:', error);
                    alert('删除失败');
                });
            }
        }
        
        function loadPhotos() {
            const container = document.getElementById('photos-container');
            container.innerHTML = '<div class="empty">加载中...</div>';
            
            fetch('/api/photos', {
                headers: getAuthHeaders()
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        if (data.data.length === 0) {
                            container.innerHTML = '<div class="empty">暂无上传照片</div>';
                        } else {
                            let html = '<div style="padding: 20px;">';
                            html += '<div style="margin-bottom: 15px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">';
                            html += '<button onclick="selectAllPhotosInManager()" style="padding: 6px 12px; border: 1px solid #d9d9d9; border-radius: 4px; background: white; color: #333; cursor: pointer; font-size: 12px;">全选</button>';
                            html += '<button onclick="deselectAllPhotosInManager()" style="padding: 6px 12px; border: 1px solid #d9d9d9; border-radius: 4px; background: white; color: #333; cursor: pointer; font-size: 12px;">取消全选</button>';
                            html += '<button onclick="deleteSelectedPhotos()" style="padding: 6px 12px; border: none; border-radius: 4px; background: #ff4d4f; color: white; cursor: pointer; font-size: 12px; font-weight: 500;">批量删除选中照片</button>';
                            html += '<span id="photoSelectedCount" style="font-size: 12px; color: #666;">已选择 0 张</span>';
                            html += '</div>';
                            
                            html += '<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px;">';
                            
                            data.data.forEach(photo => {
                                html += `<div style="border: 1px solid #e8e8e8; border-radius: 8px; padding: 10px; background: #fafafa; position: relative;">`;
                                html += `<input type="checkbox" class="photo-manager-checkbox" data-filename="${photo.filename}" onchange="updatePhotoSelectedCount()" style="position: absolute; top: 8px; left: 8px; width: 18px; height: 18px; cursor: pointer;">`;
                                html += `<img src="${photo.url}" style="width: 100%; height: 150px; object-fit: cover; border-radius: 4px; cursor: pointer;" onclick="viewImage('${photo.url}')" title="点击查看大图">`;
                                html += `<div style="margin-top: 8px; font-size: 12px; color: #666;">`;
                                html += `<div style="margin-bottom: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="${photo.filename}">${photo.filename}</div>`;
                                html += `<div style="margin-bottom: 3px;">大小: ${(photo.size / 1024).toFixed(2)} KB</div>`;
                                html += `<div>${new Date(photo.modified).toLocaleString()}</div>`;
                                html += `</div>`;
                                html += `<button onclick="deleteSinglePhoto('${photo.filename}')" style="width: 100%; margin-top: 8px; padding: 6px 12px; border: none; border-radius: 4px; background: #ff4d4f; color: white; cursor: pointer; font-size: 12px;">删除</button>`;
                                html += `</div>`;
                            });
                            
                            html += '</div></div>';
                            container.innerHTML = html;
                        }
                    } else {
                        container.innerHTML = '<div class="empty">加载失败</div>';
                    }
                })
                .catch(error => {
                    console.error('Error loading photos:', error);
                    container.innerHTML = '<div class="empty">加载失败</div>';
                });
        }
        
        // 照片管理页面的全选
        function selectAllPhotosInManager() {
            const checkboxes = document.querySelectorAll('.photo-manager-checkbox');
            checkboxes.forEach(cb => cb.checked = true);
            updatePhotoSelectedCount();
        }
        
        // 照片管理页面的取消全选
        function deselectAllPhotosInManager() {
            const checkboxes = document.querySelectorAll('.photo-manager-checkbox');
            checkboxes.forEach(cb => cb.checked = false);
            updatePhotoSelectedCount();
        }
        
        // 更新照片管理页面的选中数量
        function updatePhotoSelectedCount() {
            const checkboxes = document.querySelectorAll('.photo-manager-checkbox:checked');
            const countSpan = document.getElementById('photoSelectedCount');
            if (countSpan) {
                countSpan.textContent = `已选择 ${checkboxes.length} 张`;
            }
        }
        
        // 删除单张照片
        function deleteSinglePhoto(filename) {
            if (!confirm(`确定要删除照片 "${filename}" 吗？`)) {
                return;
            }
            
            fetch(`/api/photos/${encodeURIComponent(filename)}`, {
                method: 'DELETE',
                headers: getAuthHeaders()
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('删除成功');
                    loadPhotos();
                } else {
                    alert('删除失败: ' + (data.error || '未知错误'));
                }
            })
            .catch(error => {
                console.error('删除照片失败:', error);
                alert('删除失败');
            });
        }
        
        // 批量删除选中的照片
        function deleteSelectedPhotos() {
            const checkboxes = document.querySelectorAll('.photo-manager-checkbox:checked');
            if (checkboxes.length === 0) {
                alert('请先勾选需要删除的照片');
                return;
            }
            
            if (!confirm(`确定要删除选中的 ${checkboxes.length} 张照片吗？此操作不可恢复！`)) {
                return;
            }
            
            const filenames = Array.from(checkboxes).map(cb => cb.dataset.filename);
            let successCount = 0;
            let failCount = 0;
            
            // 逐个删除照片
            const deletePromises = filenames.map(filename => {
                return fetch(`/api/photos/${encodeURIComponent(filename)}`, {
                    method: 'DELETE',
                    headers: getAuthHeaders()
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        successCount++;
                    } else {
                        failCount++;
                    }
                })
                .catch(error => {
                    console.error('删除照片失败:', error);
                    failCount++;
                });
            });
            
            Promise.all(deletePromises).then(() => {
                alert(`删除完成！成功: ${successCount} 张，失败: ${failCount} 张`);
                loadPhotos();
            });
        }
        
        function loadData() {
            const dataContainer = document.getElementById('data-container');
            dataContainer.innerHTML = '<div class="empty">加载中...</div>';
            
            // 获取商户统计信息
            fetch('/api/merchants', {
                headers: getAuthHeaders()
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    const merchants = data.data;
                    const totalMerchants = merchants.length;
                    
                    // 统计照片数量
                    let totalPhotos = 0;
                    const photoFields = [
                        'licensePhoto', 'idCardFrontPhoto', 'idCardBackPhoto',
                        'shopFrontPhoto', 'shopInteriorPhoto', 'cashierPhoto',
                        'productCodePhoto', 'bankCardPhoto', 'accountMaterialPhoto'
                    ];
                    
                    merchants.forEach(merchant => {
                        photoFields.forEach(field => {
                            if (merchant[field]) totalPhotos++;
                        });
                    });
                    
                    // 统计商户类型
                    const merchantTypes = {};
                    merchants.forEach(merchant => {
                        const type = merchant.merchantTypeText || '未知';
                        merchantTypes[type] = (merchantTypes[type] || 0) + 1;
                    });
                    
                    // 显示统计信息
                    let html = '<div style="padding: 20px;">';
                    html += '<h3 style="margin-bottom: 20px; color: #1890ff;">数据统计</h3>';
                    
                    html += '<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px;">';
                    html += `<div style="background: #e6f7ff; padding: 20px; border-radius: 8px; text-align: center;">`;
                    html += `<div style="font-size: 32px; font-weight: bold; color: #1890ff;">${totalMerchants}</div>`;
                    html += `<div style="font-size: 14px; color: #666; margin-top: 5px;">商户总数</div>`;
                    html += `</div>`;
                    
                    html += `<div style="background: #f6ffed; padding: 20px; border-radius: 8px; text-align: center;">`;
                    html += `<div style="font-size: 32px; font-weight: bold; color: #52c41a;">${totalPhotos}</div>`;
                    html += `<div style="font-size: 14px; color: #666; margin-top: 5px;">照片总数</div>`;
                    html += `</div>`;
                    html += '</div>';
                    
                    // 商户类型分布
                    html += '<h4 style="margin-bottom: 15px; color: #333;">商户类型分布</h4>';
                    html += '<div style="background: #fafafa; padding: 20px; border-radius: 8px; margin-bottom: 30px;">';
                    
                    if (Object.keys(merchantTypes).length > 0) {
                        Object.entries(merchantTypes).forEach(([type, count]) => {
                            html += `<div style="display: flex; justify-content: space-between; margin-bottom: 10px;">`;
                            html += `<span>${type}</span>`;
                            html += `<span style="font-weight: 600;">${count} 个</span>`;
                            html += `</div>`;
                        });
                    } else {
                        html += '<div style="text-align: center; color: #999;">暂无数据</div>';
                    }
                    
                    html += '</div>';
                    
                    // 最近注册的商户
                    html += '<h4 style="margin-bottom: 15px; color: #333;">最近注册的商户</h4>';
                    html += '<div style="background: #fafafa; padding: 20px; border-radius: 8px;">';
                    
                    if (merchants.length > 0) {
                        const recentMerchants = merchants.slice(0, 5);
                        recentMerchants.forEach(merchant => {
                            html += `<div style="margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #e8e8e8;">`;
                            html += `<div style="font-weight: 600; margin-bottom: 5px;">${merchant.merchantName || '未命名'}</div>`;
                            html += `<div style="font-size: 12px; color: #666;">注册时间: ${merchant.created_at ? merchant.created_at.replace('T', ' ').substring(0, 19) : '-'}</div>`;
                            html += `</div>`;
                        });
                    } else {
                        html += '<div style="text-align: center; color: #999;">暂无数据</div>';
                    }
                    
                    html += '</div>';
                    html += '</div>';
                    
                    dataContainer.innerHTML = html;
                } else {
                    dataContainer.innerHTML = '<div class="empty">加载失败</div>';
                }
            })
            .catch(error => {
                console.error('Error loading data:', error);
                dataContainer.innerHTML = '<div class="empty">加载失败</div>';
            });
        }
        
        function logout() {
            removeToken();
            window.location.href = '/login';
        }
        
        // 全选商户
        function selectAllMerchants() {
            const checkboxes = document.querySelectorAll('.merchant-checkbox');
            const selectAllCheckbox = document.getElementById('selectAllMerchants');
            checkboxes.forEach(cb => cb.checked = selectAllCheckbox.checked);
            updateSelectedMerchantCount();
        }
        
        // 更新选中商户数量
        function updateSelectedMerchantCount() {
            const checkboxes = document.querySelectorAll('.merchant-checkbox:checked');
            const countSpan = document.getElementById('selectedMerchantCount');
            if (countSpan) {
                countSpan.textContent = `已选择 ${checkboxes.length} 个商户`;
            }
        }
        
        // 批量删除选中的商户
        function deleteSelectedMerchants() {
            const checkboxes = document.querySelectorAll('.merchant-checkbox:checked');
            if (checkboxes.length === 0) {
                alert('请先勾选需要删除的商户');
                return;
            }
            
            if (!confirm(`确定要删除选中的 ${checkboxes.length} 个商户吗？此操作不可恢复！`)) {
                return;
            }
            
            const ids = Array.from(checkboxes).map(cb => cb.dataset.id);
            let successCount = 0;
            let failCount = 0;
            
            // 逐个删除商户
            const deletePromises = ids.map(id => {
                return fetch(`/api/merchants/${id}`, {
                    method: 'DELETE',
                    headers: getAuthHeaders()
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        successCount++;
                    } else {
                        failCount++;
                    }
                })
                .catch(error => {
                    console.error('删除商户失败:', error);
                    failCount++;
                });
            });
            
            Promise.all(deletePromises).then(() => {
                alert(`删除完成！成功: ${successCount} 个，失败: ${failCount} 个`);
                loadMerchants();
            });
        }
        
        // 页面加载时检查登录状态并加载商户信息
        window.onload = function() {
            if (checkLogin()) {
                loadMerchants();
            }
        };
    </script>
</body>
</html>
